# ==========================================================
# CyberKavach 2.0 — Production Kubernetes Deployment Manifests
# ==========================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cyberkavach-api
  namespace: cyberkavach
  labels:
    app: cyberkavach-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: cyberkavach-api
  template:
    metadata:
      labels:
        app: cyberkavach-api
    spec:
      containers:
        - name: api
          image: cyberkavach/api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: cyberkavach-config
            - secretRef:
                name: cyberkavach-secrets
          resources:
            limits:
              cpu: "1000m"
              memory: "1024Mi"
            requests:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: cyberkavach-api-service
  namespace: cyberkavach
spec:
  selector:
    app: cyberkavach-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cyberkavach-api-hpa
  namespace: cyberkavach
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cyberkavach-api
  minReplicas: 3
  maxReplicas: 25
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
# ==========================================================
# Worker Deployment (Consuming BullMQ Heavy Jobs)
# ==========================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cyberkavach-worker
  namespace: cyberkavach
  labels:
    app: cyberkavach-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cyberkavach-worker
  template:
    metadata:
      labels:
        app: cyberkavach-worker
    spec:
      containers:
        - name: worker
          image: cyberkavach/worker:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: cyberkavach-config
            - secretRef:
                name: cyberkavach-secrets
          resources:
            limits:
              cpu: "1500m"
              memory: "2048Mi"
            requests:
              cpu: "750m"
              memory: "1024Mi"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cyberkavach-worker-hpa
  namespace: cyberkavach
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cyberkavach-worker
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
---
# ==========================================================
# Ingress Controller Routing (Envoy / NGINX)
# ==========================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cyberkavach-ingress
  namespace: cyberkavach
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/websocket-services: "cyberkavach-api-service"
spec:
  rules:
    - host: api.cyberkavach.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cyberkavach-api-service
                port:
                  number: 80
  tls:
    - hosts:
        - api.cyberkavach.org
      secretName: cyberkavach-tls-certs
