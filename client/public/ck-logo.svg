<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" width="512" height="512">
  <defs>
    <!-- Left half gradient - Tech Deep Grey/Black -->
    <linearGradient id="shieldLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="#1C1C1E" />
      <stop offset="50%" stopColor="#0F0F10" />
      <stop offset="100%" stopColor="#050505" />
    </linearGradient>

    <!-- Right half gradient - Vibrant Neon Red -->
    <linearGradient id="shieldRight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="#FF0055" />
      <stop offset="60%" stopColor="#FF003C" />
      <stop offset="100%" stopColor="#B3002A" />
    </linearGradient>

    <!-- Border glow gradient -->
    <linearGradient id="limeGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="#CCFF00" />
      <stop offset="100%" stopColor="#669900" />
    </linearGradient>

    <!-- Red glow filter -->
    <filter id="glow-red" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Lime glow filter -->
    <filter id="glow-lime" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Outer tech ring -->
  <circle
    cx="12"
    cy="12"
    r="11"
    stroke="url(#limeGlow)"
    strokeWidth="0.55"
    strokeDasharray="4 6"
    opacity="0.6"
  />

  <!-- Inner tech ring -->
  <circle
    cx="12"
    cy="12"
    r="10"
    stroke="#FF003C"
    strokeWidth="0.3"
    strokeDasharray="1 8"
    opacity="0.4"
  />

  <!-- Left half - deep tech background -->
  <path
    d="M12 3L4 6.8V11.5C4 16.5 7.5 20.2 12 22V3Z"
    fill="url(#shieldLeft)"
  />

  <!-- Right half - neon red -->
  <path
    d="M12 3L20 6.8V11.5C20 16.5 16.5 20.2 12 22V3Z"
    fill="url(#shieldRight)"
    filter="url(#glow-red)"
  />

  <!-- Subtle outer shield border -->
  <path
    d="M12 3L4 6.8V11.5C4 16.5 7.5 20.2 12 22C16.5 20.2 20 16.5 20 11.5V6.8L12 3Z"
    fill="none"
    stroke="url(#limeGlow)"
    strokeWidth="0.75"
    strokeOpacity="0.75"
  />

  <!-- CK monogram C side -->
  <path
    d="M 10.5 8.5 L 7 10.25 L 7 13.75 L 10.5 15.5"
    stroke="#CCFF00"
    strokeWidth="3.5"
    strokeLinecap="round"
    strokeLinejoin="round"
    opacity="0.25"
    filter="url(#glow-lime)"
  />
  <path
    d="M 10.5 8.5 L 7 10.25 L 7 13.75 L 10.5 15.5"
    stroke="#FFFFFF"
    strokeWidth="2.2"
    strokeLinecap="round"
    strokeLinejoin="round"
  />

  <!-- CK monogram K side -->
  <path
    d="M 13.5 8.5 L 13.5 15.5 M 17 8.5 L 13.5 12 L 17 15.5"
    stroke="#FF003C"
    strokeWidth="3.5"
    strokeLinecap="round"
    strokeLinejoin="round"
    opacity="0.25"
    filter="url(#glow-red)"
  />
  <path
    d="M 13.5 8.5 L 13.5 15.5 M 17 8.5 L 13.5 12 L 17 15.5"
    stroke="#FFFFFF"
    strokeWidth="2.2"
    strokeLinecap="round"
    strokeLinejoin="round"
  />
</svg>
