version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: cyberkavach_db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: cyberkavach
      POSTGRES_PASSWORD: cyberkavach_secret
      POSTGRES_DB: cyberkavach
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: cyberkavach_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  pgdata:
