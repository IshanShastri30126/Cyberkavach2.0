# ==========================================================
# CyberKavach 2.0 — Central PgBouncer Connection Pool Config
# ==========================================================

[databases]
# Format: DB_NAME = host=DB_HOST port=DB_PORT dbname=DB_NAME auth_user=DB_USER
cyberkavach_db = host=postgres-primary.database.svc.cluster.local port=5432 dbname=cyberkavach auth_user=postgres

[pgbouncer]
# Address and port to listen on
listen_addr = *
listen_port = 6432

# Authentication settings
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

# Connection pool behavior
# 'transaction' mode allows short connections to share a small backend pool
pool_mode = transaction

# Maximum number of client connections allowed
max_client_conn = 10000

# Default size of pools per-user/per-db
default_pool_size = 50

# Minimum pool size
min_pool_size = 10

# Maximum database connections allowed to target PostgreSQL database
max_db_connections = 200

# How long to keep idle connections (seconds)
idle_transaction_timeout = 60
server_idle_timeout = 600
query_timeout = 0
